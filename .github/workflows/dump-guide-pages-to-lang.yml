name: Dump guide pages to lang

on:
  workflow_dispatch:
  pull_request:
    branches: [ master, main, release/** ]
    paths:
      - "assets/**/guidenh/_*/**/*.md"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

