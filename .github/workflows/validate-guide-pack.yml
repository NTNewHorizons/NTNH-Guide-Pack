name: Validate guide pack

on:
  pull_request:
    paths:
      - "assets/**/*.md"
      - "pack.mcmeta"
      - ".github/workflows/validate-guide-pack.yml"
  push:
    branches: [ master ]
    paths:
      - "assets/**/*.md"
      - "pack.mcmeta"
      - ".github/workflows/validate-guide-pack.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML parser
        run: python -m pip install PyYAML==6.0.2

      - name: Validate metadata and guide frontmatter
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          json.loads(Path("pack.mcmeta").read_text(encoding="utf-8-sig"))

          errors = 0
          for path in sorted(Path("assets").glob("**/guidenh/**/*.md")):
              text = path.read_text(encoding="utf-8-sig")
              if not text.startswith("---\n"):
                  if text.partition("\n")[0].rstrip(" \t") == "---":
                      print(f"::error file={path},line=1::Opening YAML fence must be exactly ---")
                      errors += 1
                  continue

              end = text.find("\n---\n", 4)
              if end < 0 and text.endswith("\n---"):
                  end = len(text) - 4
              if end < 0:
                  print(f"::error file={path},line=1::Unclosed YAML frontmatter")
                  errors += 1
                  continue

              try:
                  frontmatter = yaml.safe_load(text[4:end])
                  if frontmatter is not None and not isinstance(frontmatter, dict):
                      raise TypeError("Frontmatter root must be a map")
              except yaml.YAMLError as error:
                  mark = getattr(error, "problem_mark", None)
                  line = mark.line + 2 if mark else 1
                  message = str(error).replace("\n", " ")
                  print(f"::error file={path},line={line}::{message}")
                  errors += 1
              except TypeError as error:
                  print(f"::error file={path},line=1::{error}")
                  errors += 1

          if errors:
              raise SystemExit(f"Invalid guide frontmatter in {errors} file(s)")
          PY
